<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MKControl Receiver</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #status-line {
    position: absolute;
    top: 24px;
    left: 24px;
    font-size: 20px;
    color: #888;
  }

  #art {
    width: 320px;
    height: 320px;
    object-fit: cover;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    background: #111;
    margin-bottom: 36px;
    display: none;
  }

  #title {
    font-size: 42px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 8px;
    max-width: 90vw;
  }

  #artist {
    font-size: 28px;
    color: #ccc;
    text-align: center;
    margin-bottom: 40px;
    max-width: 90vw;
  }

  #lyric {
    font-size: 34px;
    font-weight: bold;
    text-align: center;
    max-width: 85vw;
    min-height: 44px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    transition: opacity 0.15s ease-in-out;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="status-line">MKControl Receiver - waiting for cast...</div>
  <img id="art" src="" alt="">
  <div id="title"></div>
  <div id="artist"></div>
  <div id="lyric"></div>
</div>

<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script>
(function () {
  var statusEl = document.getElementById('status-line');
  var artEl = document.getElementById('art');
  var titleEl = document.getElementById('title');
  var artistEl = document.getElementById('artist');
  var lyricEl = document.getElementById('lyric');

  var context = cast.framework.CastReceiverContext.getInstance();
  var playerManager = context.getPlayerManager();

  // Lyrics are delivered by plain HTTP polling against MKControl's own LAN
  // server (the same one already serving /audio and /art rock-solid), not
  // through Cast's custom-message channel. That channel consistently killed
  // playback shortly after the first message across extensive testing on
  // this hardware; polling sidesteps the Cast protocol entirely for this.
  var lyricPollUrl = null;
  var lyricPollTimer = null;

  function setNowPlayingFromMediaInfo(mediaInfo) {
    try {
      var metadata = (mediaInfo && mediaInfo.metadata) || {};
      titleEl.textContent = metadata.title || (mediaInfo && mediaInfo.contentId) || '';
      artistEl.textContent = metadata.artist || metadata.albumArtist || '';

      var images = metadata.images || [];
      if (images.length > 0 && images[0].url) {
        artEl.src = images[0].url;
        artEl.style.display = 'block';
      } else {
        artEl.style.display = 'none';
      }

      statusEl.style.display = 'none';

      // MKControl sends this via MediaInformation.customData now, not
      // metadata - metadata is a fixed schema (MusicTrackMediaMetadata) and
      // non-standard keys were very likely being silently dropped by the
      // platform before ever reaching this page. customData is the correct
      // pass-through field for sender-defined data like this.
      var customData = (mediaInfo && mediaInfo.customData) || {};
      if (typeof customData.lyricUrl === 'string' && customData.lyricUrl) {
        lyricPollUrl = customData.lyricUrl;
      }

      if (lyricPollUrl && !lyricPollTimer) {
        lyricPollTimer = setInterval(pollLyric, 500);
      }
    } catch (e) {
      console.error('setNowPlayingFromMediaInfo failed', e);
    }
  }

  function pollLyric() {
    if (!lyricPollUrl) return;
    fetch(lyricPollUrl, { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (typeof data.lyric === 'string') {
          lyricEl.textContent = data.lyric;
        }
      })
      .catch(function () {
        // Transient poll failures are expected occasionally over a real
        // network - just try again on the next tick.
      });
  }

  // Native playback is entirely handled by PlayerManager already - this just
  // updates our custom UI whenever a new track is loaded or media status
  // changes, using the same metadata MKControl already sends in play_media().
  playerManager.addEventListener(
    cast.framework.events.EventType.MEDIA_STATUS,
    function (event) {
      try {
        var mediaInformation = playerManager.getMediaInformation();
        if (mediaInformation) {
          setNowPlayingFromMediaInfo(mediaInformation);
        }
      } catch (e) {
        console.error('MEDIA_STATUS handler failed', e);
      }
    }
  );

  var options = new cast.framework.CastReceiverOptions();
  context.start(options);
})();
</script>

</body>
</html>
