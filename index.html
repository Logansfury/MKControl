<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MKControl Receiver</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #status-line {
    position: absolute;
    top: 24px;
    left: 24px;
    font-size: 20px;
    color: #888;
  }

  #art {
    width: 320px;
    height: 320px;
    object-fit: cover;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    background: #111;
    margin-bottom: 36px;
    display: none;
  }

  #title {
    font-size: 42px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 8px;
    max-width: 90vw;
  }

  #artist {
    font-size: 28px;
    color: #ccc;
    text-align: center;
    margin-bottom: 40px;
    max-width: 90vw;
  }

  #lyric {
    font-size: 34px;
    font-weight: bold;
    text-align: center;
    max-width: 85vw;
    min-height: 44px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    transition: opacity 0.15s ease-in-out;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="status-line">MKControl Receiver - waiting for cast...</div>
  <img id="art" src="" alt="">
  <div id="title"></div>
  <div id="artist"></div>
  <div id="lyric"></div>
</div>

<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script>
(function () {
  // Must match the namespace MKControl's custom Cast controller uses.
  var LYRICS_NAMESPACE = 'urn:x-cast:com.mkcontrol.lyrics';

  var statusEl = document.getElementById('status-line');
  var artEl = document.getElementById('art');
  var titleEl = document.getElementById('title');
  var artistEl = document.getElementById('artist');
  var lyricEl = document.getElementById('lyric');

  var context = cast.framework.CastReceiverContext.getInstance();
  var playerManager = context.getPlayerManager();
  var currentSenderId = null;

  context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, function (event) {
    currentSenderId = event.senderId;
  });

  // Since remote Chrome DevTools inspection isn't available on this
  // hardware, report our own errors/state straight back to MKControl over
  // the same message channel already used for lyrics, so we get real
  // diagnostics without needing a browser inspector at all.
  function reportBack(payload) {
    try {
      var senders = context.getSenders();
      var targetId = currentSenderId || (senders.length ? senders[0].id : null);
      if (targetId) {
        context.sendCustomMessage(LYRICS_NAMESPACE, targetId, payload);
      }
    } catch (e) {
      // Nothing further we can do if even the report itself fails.
    }
  }

  window.onerror = function (msg, url, line, col, error) {
    reportBack({ debug: 'window.onerror', msg: String(msg), line: line, col: col });
  };

  playerManager.addEventListener(cast.framework.events.EventType.ERROR, function (event) {
    reportBack({
      debug: 'PLAYER_ERROR',
      type: event.type,
      detailedErrorCode: event.detailedErrorCode,
      error: JSON.stringify(event, Object.getOwnPropertyNames(event))
    });
  });

  function setNowPlayingFromMediaInfo(mediaInfo) {
    try {
      var metadata = (mediaInfo && mediaInfo.metadata) || {};
      titleEl.textContent = metadata.title || (mediaInfo && mediaInfo.contentId) || '';
      artistEl.textContent = metadata.artist || metadata.albumArtist || '';

      var images = metadata.images || [];
      if (images.length > 0 && images[0].url) {
        artEl.src = images[0].url;
        artEl.style.display = 'block';
      } else {
        artEl.style.display = 'none';
      }

      statusEl.style.display = 'none';
    } catch (e) {
      console.error('setNowPlayingFromMediaInfo failed', e);
      reportBack({ debug: 'setNowPlayingFromMediaInfo_failed', error: String(e) });
    }
  }

  // Native playback is entirely handled by PlayerManager already - this just
  // updates our custom UI whenever a new track is loaded or media status
  // changes, using the same metadata MKControl already sends in play_media().
  playerManager.addEventListener(
    cast.framework.events.EventType.MEDIA_STATUS,
    function (event) {
      try {
        var mediaInformation = playerManager.getMediaInformation();
        if (mediaInformation) {
          setNowPlayingFromMediaInfo(mediaInformation);
        }
      } catch (e) {
        console.error('MEDIA_STATUS handler failed', e);
        reportBack({ debug: 'MEDIA_STATUS_handler_failed', error: String(e) });
      }
    }
  );

  // Live lyric line updates pushed from MKControl over a custom message
  // channel - independent of the audio pipeline entirely, so audio playback
  // stays fully native/instant while this just updates a text element.
  context.addCustomMessageListener(LYRICS_NAMESPACE, function (event) {
    reportBack({ debug: 'lyric_message_received', senderId: event.senderId });
    try {
      var data = event.data || {};
      if (typeof data.lyric === 'string') {
        lyricEl.textContent = data.lyric;
      }
      if (typeof data.title === 'string') {
        titleEl.textContent = data.title;
      }
      if (typeof data.artist === 'string') {
        artistEl.textContent = data.artist;
      }
      if (typeof data.art_url === 'string' && data.art_url) {
        artEl.src = data.art_url;
        artEl.style.display = 'block';
      }
      statusEl.style.display = 'none';
      reportBack({ debug: 'lyric_message_applied_ok' });
    } catch (e) {
      console.error('Lyrics message handler failed', e);
      reportBack({ debug: 'lyric_message_handler_failed', error: String(e) });
    }
  });

  var options = new cast.framework.CastReceiverOptions();
  // Custom message namespaces must be declared here, before context.start().
  // Without this, the framework never advertises the namespace as supported
  // by this app, and sender-side send_message() calls have nothing to
  // succeed against.
  options.customNamespaces = {};
  options.customNamespaces[LYRICS_NAMESPACE] = cast.framework.system.MessageType.JSON;
  // Keep the default media playback behavior (native buffering/seek/etc.);
  // we are only adding a custom UI layer and a side-channel for lyrics.
  options.skipPlayersLoad = false;

  context.start(options);
})();
</script>

</body>
</html>
